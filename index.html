<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Novel Writer Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Merriweather", serif;
      height: 100vh;
      display: flex;
      color: #222;
      background: #f3f4f6;
    }

    /* Project manager */
    #projectManager {
      padding: 20px;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    #projectManager h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    #projectList {
      list-style: none;
      padding: 0;
      margin: 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      max-height: 50vh;
      overflow-y: auto;
      background: #ffffff;
    }
    #projectList li {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    #projectList li:last-child {
      border-bottom: none;
    }
    #projectList li:hover {
      background: #f3f4ff;
    }
    #newProjectName {
      padding: 4px 6px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #ccc;
      width: 60%;
      margin-right: 6px;
      font-family: inherit;
    }

    /* App layout */
    #app {
      flex: 1;
      display: none;
    }
    #sidebar {
      width: 260px;
      border-right: 1px solid #ddd;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fafafa;
    }
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 8px;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
    }
    button {
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      padding: 4px 8px;
      font-size: 13px;
      font-family: inherit;
    }
    button.primary {
      background: #2563eb;
      border-color: #1d4ed8;
      color: white;
    }
    button.small {
      font-size: 11px;
      padding: 2px 6px;
    }
    input, textarea, select {
      font-family: inherit;
      font-size: 14px;
    }
    input[type="text"] {
      width: 100%;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    #projectTitle {
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-bottom: 1px solid transparent;
      padding: 2px 0;
      background: transparent;
      width: 100%;
    }
    #projectTitle:focus {
      outline: none;
      border-bottom-color: #2563eb;
    }
    .section {
      border-top: 1px solid #e5e5e5;
      padding-top: 8px;
    }
    #chaptersList {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 40vh;
      overflow-y: auto;
      border-radius: 4px;
      border: 1px solid #e5e5e5;
      background: white;
    }
    #chaptersList li {
      padding: 6px 8px;
      border-bottom: 1px solid #f1f1f1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      cursor: pointer;
    }
    #chaptersList li:last-child {
      border-bottom: none;
    }
    #chaptersList li.active {
      background: #e0edff;
    }
    #chaptersList span.title {
      flex: 1;
      margin-right: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
      background: #f9fafb;
    }
    .tab {
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      border-right: 1px solid #e5e5e5;
    }
    .tab.active {
      background: white;
      border-bottom: 2px solid #2563eb;
      font-weight: 600;
    }
    #editorArea {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #chapterHeader {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 8px;
      align-items: center;
      background: #ffffff;
    }
    #chapterTitleInput {
      flex: 1;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 14px;
      font-family: inherit;
    }

    /* Formatting toolbar */
    #formatToolbar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #ddd;
      background: #f3f3f3;
      align-items: center;
      flex-wrap: wrap;
    }
    #formatToolbar select,
    #formatToolbar button {
      padding: 4px 6px;
      font-size: 13px;
    }
    #formatToolbar button {
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
    }
    #formatToolbar button:hover {
      background: #e8e8e8;
    }
    #lineSpacing,
    #paragraphStyle {
      padding: 4px 6px;
      font-size: 13px;
    }

    /* Multi-page layout */
    #pageContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      overflow-y: auto;
      background: #f3f4f6;
    }
    .page {
      background: #ffffff;
      width: 880px;
      min-height: 950px; /* paperback-ish height */
      padding: 60px 70px;
      box-shadow: 0 0 12px rgba(0,0,0,0.12);
      border-radius: 4px;
      margin-bottom: 24px;
    }
    .page-content {
      max-width: 100%;
      margin: 0 auto;
      line-height: 1.6;
      font-size: 18px;
      outline: none;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* Hidden master editor (single source of truth) */
    #textEditor {
      display: none;
    }

    /* Rich text extras */
    .page-content blockquote {
      border-left: 4px solid #ccc;
      padding-left: 10px;
      margin-left: 0;
      color: #555;
    }
    .page-content pre {
      background: #f4f4f4;
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.9em;
    }

    #charactersEditor, #notesEditor {
      flex: 1;
      width: 100%;
      border: none;
      padding: 10px 12px;
      resize: none;
      outline: none;
      line-height: 1.5;
      display: none;
    }

    #statusBar {
      font-size: 12px;
      padding: 4px 8px;
      border-top: 1px solid #eee;
      color: #666;
      display: flex;
      justify-content: space-between;
      background: #fafafa;
    }
    #meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #meta textarea {
      width: 100%;
      min-height: 60px;
      resize: vertical;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 13px;
      font-family: inherit;
    }

    .first-line-indent p {
      text-indent: 2em;
      margin-top: 0;
      margin-bottom: 1em;
    }


  </style>
</head>
<body>
  <!-- Project manager (multiple books) -->
  <div id="projectManager">
    <h1>Your Books</h1>
    <ul id="projectList"></ul>

    <div style="margin-top:12px;">
      <input id="newProjectName" placeholder="New book title" />
      <button id="createProjectBtn">Create Book</button>
    </div>
  </div>

  <!-- Main app (single book at a time) -->
  <div id="app">
    <div id="sidebar">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 style="margin:0;">Novel Writer</h1>
        <button id="backToMenuBtn" class="small">Menu</button>
      </div>
      <input id="projectTitle" placeholder="Untitled Project" />

      <div class="section">
        <h2>Chapters</h2>
        <ul id="chaptersList"></ul>
        <div style="margin-top: 6px; display: flex; gap: 6px;">
          <button id="addChapterBtn" class="primary small">+ Chapter</button>
          <button id="deleteChapterBtn" class="small">Delete</button>
        </div>
      </div>

      <div class="section">
        <h2>Story Notes</h2>
        <div id="meta">
          <textarea id="storyPremise" placeholder="Premise / logline"></textarea>
          <textarea id="storySynopsis" placeholder="Short synopsis"></textarea>
        </div>
      </div>
    </div>

    <div id="main">
      <div id="tabs">
        <div class="tab active" data-tab="manuscript">Manuscript</div>
        <div class="tab" data-tab="characters">Characters</div>
        <div class="tab" data-tab="notes">Notes</div>
      </div>

      <div id="editorArea">
        <div id="chapterHeader">
          <input id="chapterTitleInput" placeholder="Chapter title" />
          <span id="chapterLabel"></span>
        </div>

        <!-- Formatting toolbar -->
        <div id="formatToolbar">
          <select id="fontFamily">
            <option value='"Merriweather", serif' selected>Merriweather</option>
            <option value='serif'>Serif</option>
            <option value='sans-serif'>Sans-serif</option>
            <option value='monospace'>Monospace</option>
          </select>

          <select id="fontSize">
            <option value="16px">16</option>
            <option value="18px" selected>18</option>
            <option value="20px">20</option>
            <option value="22px">22</option>
            <option value="24px">24</option>
          </select>

          <select id="lineSpacing">
            <option value="1.4">1.4</option>
            <option value="1.6" selected>1.6</option>
            <option value="1.8">1.8</option>
            <option value="2.0">2.0</option>
          </select>

          <select id="paragraphStyle">
            <option value="p">Paragraph</option>
            <option value="h1">Heading 1</option>
            <option value="h2">Heading 2</option>
            <option value="h3">Heading 3</option>
            <option value="blockquote">Blockquote</option>
            <option value="pre">Code Block</option>
          </select>

          <button id="firstLineIndentBtn">Indent ¶</button>
          
          <button data-align="left">Left</button>
          <button data-align="center">Center</button>
          <button data-align="right">Right</button>
          <button data-align="justify">Justify</button>

          <button id="boldBtn"><b>B</b></button>
          <button id="italicBtn"><i>I</i></button>
          <button id="underlineBtn"><u>U</u></button>
          <button id="strikeBtn"><s>S</s></button>
        </div>

        <!-- Multi-page manuscript view -->
        <div id="pageContainer"></div>

        <!-- Hidden master editor (single source of truth) -->
        <div id="textEditor" contenteditable="true" spellcheck="true"></div>

        <!-- Other tabs -->
        <textarea id="charactersEditor" placeholder="Character sheets, arcs, relationships..."></textarea>
        <textarea id="notesEditor" placeholder="Worldbuilding, loose ideas, research notes..."></textarea>

        <div id="statusBar">
          <span id="wordCount">0 words</span>
          <span id="saveStatus">Saved</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let project = {
      title: "My Novel",
      premise: "",
      synopsis: "",
      chapters: [],
      activeChapterId: null
    };

    const PROJECT_INDEX_KEY = "novelWriter_projects";

    function loadProjectIndex() {
      const raw = localStorage.getItem(PROJECT_INDEX_KEY);
      return raw ? JSON.parse(raw) : [];
    }

    function saveProjectIndex(list) {
      localStorage.setItem(PROJECT_INDEX_KEY, JSON.stringify(list));
    }

    function showProjectManager() {
      document.getElementById("projectManager").style.display = "flex";
      document.getElementById("app").style.display = "none";
      renderProjectList();
    }

    function openProject(projectId) {
      localStorage.setItem("novelWriter_activeProject", projectId);
      document.getElementById("projectManager").style.display = "none";
      document.getElementById("app").style.display = "flex";
      loadProject();
      renderSidebar();
      renderEditor();
    }

    function renderProjectList() {
      const list = loadProjectIndex();
      const ul = document.getElementById("projectList");
      ul.innerHTML = "";

      list.forEach(project => {
        const li = document.createElement("li");
        li.textContent = project.name;
        li.addEventListener("click", () => openProject(project.id));

        li.addEventListener("contextmenu", e => {
          e.preventDefault();
          if (confirm(`Delete "${project.name}"?`)) {
            deleteProject(project.id);
          }
        });

        ul.appendChild(li);
      });
    }

    function createProject(name) {
      const id = "proj_" + Date.now();
      const list = loadProjectIndex();

      list.push({ id, name });
      saveProjectIndex(list);

      localStorage.setItem(id, JSON.stringify({
        title: name,
        premise: "",
        synopsis: "",
        chapters: [],
        activeChapterId: null
      }));

      openProject(id);
    }

    function deleteProject(id) {
      const list = loadProjectIndex().filter(p => p.id !== id);
      saveProjectIndex(list);
      localStorage.removeItem(id);
      renderProjectList();
    }

    function loadProject() {
      const projectId = localStorage.getItem("novelWriter_activeProject");
      const raw = localStorage.getItem(projectId);

      if (raw) {
        project = JSON.parse(raw);
      } else {
        project = {
          title: "Untitled",
          premise: "",
          synopsis: "",
          chapters: [],
          activeChapterId: null
        };
      }

      if (!project.chapters || project.chapters.length === 0) {
        const first = createChapter("Chapter 1");
        project.chapters.push(first);
        project.activeChapterId = first.id;
        saveProject();
      }
    }

    function saveProject() {
      const projectId = localStorage.getItem("novelWriter_activeProject");
      if (!projectId) return;
      localStorage.setItem(projectId, JSON.stringify(project));
      setSaveStatus("Saved");
    }

    function setSaveStatus(text) {
      const el = document.getElementById("saveStatus");
      if (el) el.textContent = text;
    }

    function createChapter(title) {
      return {
        id: "ch_" + Date.now() + "_" + Math.random().toString(16).slice(2),
        title: title || "Untitled Chapter",
        text: "",
        characters: "",
        notes: ""
      };
    }

    function getActiveChapter() {
      return project.chapters.find(c => c.id === project.activeChapterId) || project.chapters[0];
    }

    function renderSidebar() {
      document.getElementById("projectTitle").value = project.title || "";
      document.getElementById("storyPremise").value = project.premise || "";
      document.getElementById("storySynopsis").value = project.synopsis || "";

      const ul = document.getElementById("chaptersList");
      ul.innerHTML = "";
      project.chapters.forEach((ch, index) => {
        const li = document.createElement("li");
        li.dataset.id = ch.id;
        if (ch.id === project.activeChapterId) li.classList.add("active");

        const spanTitle = document.createElement("span");
        spanTitle.className = "title";
        spanTitle.textContent = (index + 1) + ". " + (ch.title || "Untitled");

        const wc = document.createElement("span");
        wc.style.fontSize = "11px";
        wc.style.color = "#777";

        const plain = (ch.text || "").replace(/<[^>]+>/g, " ");
        const count = plain.trim().split(/\s+/).filter(Boolean).length || 0;
        wc.textContent = count;

        li.appendChild(spanTitle);
        li.appendChild(wc);

        li.addEventListener("click", () => {
          project.activeChapterId = ch.id;
          saveProject();
          renderSidebar();
          renderEditor();
        });

        ul.appendChild(li);
      });
    }

    function renderEditor() {
      const ch = getActiveChapter();
      if (!ch) return;

      const index = project.chapters.findIndex(c => c.id === ch.id);
      document.getElementById("chapterTitleInput").value = ch.title || "";
      document.getElementById("chapterLabel").textContent = "Chapter " + (index + 1);

      const master = document.getElementById("textEditor");
      master.innerHTML = ch.text || "";

      renderPagesFromContent(ch.text || "");
      document.getElementById("charactersEditor").value = ch.characters || "";
      document.getElementById("notesEditor").value = ch.notes || "";

      updateWordCount();
      switchTab(document.querySelector(".tab.active").dataset.tab);
    }

    function updateWordCount() {
      const ch = getActiveChapter();
      if (!ch) return;

      const text = ch.text || "";
      const plain = text.replace(/<[^>]+>/g, " ");
      const words = plain.trim().split(/\s+/).filter(Boolean).length;

      document.getElementById("wordCount").textContent = words + " words";
    }

    function switchTab(tabName) {
      const tabs = document.querySelectorAll(".tab");
      tabs.forEach(t => {
        t.classList.toggle("active", t.dataset.tab === tabName);
      });

      const pageContainer = document.getElementById("pageContainer");
      const chars = document.getElementById("charactersEditor");
      const notes = document.getElementById("notesEditor");

      if (tabName === "manuscript") {
        pageContainer.style.display = "flex";
        chars.style.display = "none";
        notes.style.display = "none";
      } else if (tabName === "characters") {
        pageContainer.style.display = "none";
        chars.style.display = "block";
        notes.style.display = "none";
      } else if (tabName === "notes") {
        pageContainer.style.display = "none";
        chars.style.display = "none";
        notes.style.display = "block";
      }
    }

    /* --- Pagination (approximate hard pagination) --- */

    function renderPagesFromContent(html) {
      const container = document.getElementById("pageContainer");
      container.innerHTML = "";

      // Simple heuristic: split by paragraphs into chunks
      const temp = document.createElement("div");
      temp.innerHTML = html || "";
      const nodes = Array.from(temp.childNodes);

      const PAGE_CHAR_TARGET = 2200; // tweak for more/less text per page
      let currentPage = createPage();
      let currentLength = 0;

      nodes.forEach(node => {
        const clone = node.cloneNode(true);
        currentPage.content.appendChild(clone);

        const text = clone.textContent || "";
        currentLength += text.length;

        if (currentLength > PAGE_CHAR_TARGET) {
          currentPage = createPage();
          currentLength = 0;
        }
      });

      if (!container.firstChild) {
        createPage(); // ensure at least one page
      }

      // Make pages editable and sync back
      container.querySelectorAll(".page-content").forEach(pageEl => {
        pageEl.contentEditable = "true";
        pageEl.spellcheck = true;
        pageEl.addEventListener("input", syncPagesToMaster);
      });
    }

    function createPage() {
      const container = document.getElementById("pageContainer");
      const page = document.createElement("div");
      page.className = "page";
      const content = document.createElement("div");
      content.className = "page-content";
      page.appendChild(content);
      container.appendChild(page);
      return { page, content };
    }

    function syncPagesToMaster() {
      const pages = Array.from(document.querySelectorAll(".page-content"));
      const combined = pages.map(p => p.innerHTML).join("<br><br>");
      const master = document.getElementById("textEditor");
      master.innerHTML = combined;

      const ch = getActiveChapter();
      if (!ch) return;
      ch.text = combined;
      setSaveStatus("Unsaved…");
      updateWordCount();
      debounceSave();
      renderSidebar();
    }

    function getActivePageEditor() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return document.querySelector(".page-content");
      let node = sel.anchorNode;
      while (node && !(node.classList && node.classList.contains("page-content"))) {
        node = node.parentNode;
      }
      return node || document.querySelector(".page-content");
    }

    function exec(cmd, value = null) {
      const editor = getActivePageEditor();
      if (!editor) return;
      editor.focus();
      document.execCommand(cmd, false, value);
      syncPagesToMaster();
    }

    function applyParagraphStyle(tag) {
      const editor = getActivePageEditor();
      if (!editor) return;
      editor.focus();
      document.execCommand("formatBlock", false, tag);
      syncPagesToMaster();
    }

    function setupFormattingControls() {
      const savedFont = localStorage.getItem("nw_fontFamily") || '"Merriweather", serif';
      const savedSize = localStorage.getItem("nw_fontSize") || "18px";
      const savedAlign = localStorage.getItem("nw_textAlign") || "left";
      const savedSpacing = localStorage.getItem("nw_lineSpacing") || "1.6";
      const indentEnabled = localStorage.getItem("nw_firstLineIndent") === "1";
      
      applyFirstLineIndent(indentEnabled);


      document.getElementById("fontFamily").value = savedFont;
      document.getElementById("fontSize").value = savedSize;
      document.getElementById("lineSpacing").value = savedSpacing;
      

      function applyToPages(fn) {
        document.querySelectorAll(".page-content").forEach(fn);
      }

      applyToPages(el => {
        el.style.fontFamily = savedFont;
        el.style.fontSize = savedSize;
        el.style.textAlign = savedAlign;
        el.style.lineHeight = savedSpacing;
      });

      document.getElementById("fontFamily").addEventListener("change", e => {
        const val = e.target.value;
        applyToPages(el => el.style.fontFamily = val);
        localStorage.setItem("nw_fontFamily", val);
      });

      document.getElementById("fontSize").addEventListener("change", e => {
        const val = e.target.value;
        applyToPages(el => el.style.fontSize = val);
        localStorage.setItem("nw_fontSize", val);
      });

      document.getElementById("lineSpacing").addEventListener("change", e => {
        const spacing = e.target.value;
        applyToPages(el => el.style.lineHeight = spacing);
        localStorage.setItem("nw_lineSpacing", spacing);
      });

      document.querySelectorAll("#formatToolbar button[data-align]").forEach(btn => {
        btn.addEventListener("click", () => {
          const align = btn.dataset.align;
          applyToPages(el => el.style.textAlign = align);
          localStorage.setItem("nw_textAlign", align);
        });
      });

      document.getElementById("paragraphStyle").addEventListener("change", (e) => {
        applyParagraphStyle(e.target.value);
      });

      document.getElementById("boldBtn").addEventListener("click", () => exec("bold"));
      document.getElementById("italicBtn").addEventListener("click", () => exec("italic"));
      document.getElementById("underlineBtn").addEventListener("click", () => exec("underline"));
      document.getElementById("strikeBtn").addEventListener("click", () => exec("strikeThrough"));

      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey || e.metaKey) {
          if (e.key === "b" || e.key === "B") { exec("bold"); e.preventDefault(); }
          if (e.key === "i" || e.key === "I") { exec("italic"); e.preventDefault(); }
          if (e.key === "u" || e.key === "U") { exec("underline"); e.preventDefault(); }
        }
      });
    }

    function setupEvents() {
      document.getElementById("projectTitle").addEventListener("input", (e) => {
        project.title = e.target.value;
        setSaveStatus("Unsaved…");
        debounceSave();
      });

      document.getElementById("storyPremise").addEventListener("input", (e) => {
        project.premise = e.target.value;
        setSaveStatus("Unsaved…");
        debounceSave();
      });

      document.getElementById("storySynopsis").addEventListener("input", (e) => {
        project.synopsis = e.target.value;
        setSaveStatus("Unsaved…");
        debounceSave();
      });

      document.getElementById("chapterTitleInput").addEventListener("input", (e) => {
        const ch = getActiveChapter();
        if (!ch) return;
        ch.title = e.target.value;
        setSaveStatus("Unsaved…");
        debounceSave();
        renderSidebar();
      });

      document.getElementById("charactersEditor").addEventListener("input", (e) => {
        const ch = getActiveChapter();
        if (!ch) return;
        ch.characters = e.target.value;
        setSaveStatus("Unsaved…");
        debounceSave();
      });

      document.getElementById("notesEditor").addEventListener("input", (e) => {
        const ch = getActiveChapter();
        if (!ch) return;
        ch.notes = e.target.value;
        setSaveStatus("Unsaved…");
        debounceSave();
      });

      document.getElementById("addChapterBtn").addEventListener("click", () => {
        const num = project.chapters.length + 1;
        const ch = createChapter("Chapter " + num);
        project.chapters.push(ch);
        project.activeChapterId = ch.id;
        saveProject();
        renderSidebar();
        renderEditor();
      });

      document.getElementById("deleteChapterBtn").addEventListener("click", () => {
        if (project.chapters.length <= 1) {
          alert("You need at least one chapter.");
          return;
        }
        const ch = getActiveChapter();
        if (!ch) return;
        if (!confirm("Delete \"" + (ch.title || "this chapter") + "\"?")) return;

        project.chapters = project.chapters.filter(c => c.id !== ch.id);
        project.activeChapterId = project.chapters[0].id;
        saveProject();
        renderSidebar();
        renderEditor();
      });

      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          switchTab(tab.dataset.tab);
        });
      });

      document.getElementById("createProjectBtn").addEventListener("click", () => {
        const name = document.getElementById("newProjectName").value.trim();
        if (!name) return alert("Enter a book title");
        createProject(name);
      });

      document.getElementById("backToMenuBtn").addEventListener("click", () => {
        document.getElementById("app").style.display = "none";
        document.getElementById("projectManager").style.display = "flex";
        renderProjectList();
      });
    }

    function applyFirstLineIndent(enabled) {
      const pages = document.querySelectorAll(".page-content");

      pages.forEach(page => {
        if (enabled) {
          page.classList.add("first-line-indent");
        } else {
          page.classList.remove("first-line-indent");
        }
      });

      // Save preference
      localStorage.setItem("nw_firstLineIndent", enabled ? "1" : "0");

      // Sync back to master
      syncPagesToMaster();
    } 

    document.getElementById("firstLineIndentBtn").addEventListener("click", () => {
      const current = localStorage.getItem("nw_firstLineIndent") === "1";
      applyFirstLineIndent(!current);
    });

    document.addEventListener("keydown", e => {
      const editor = getActivePageEditor();
      if (!editor) return;

      if (e.key === "Tab") {
        e.preventDefault();

        if (e.shiftKey) {
          document.execCommand("outdent");
        } else {
          document.execCommand("indent");
        }

        syncPagesToMaster();
      }
    });




    let saveTimer = null;
    function debounceSave() {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        saveProject();
      }, 600);
    }

    // Init
    setupEvents();

    const active = localStorage.getItem("novelWriter_activeProject");
    if (!active) {
      showProjectManager();
    } else {
      openProject(active);
    }

    // Formatting controls need pages present, so re-run after first render
    // We hook into a small delay to let pages render
    setTimeout(setupFormattingControls, 500);
  </script>
</body>
</html>
